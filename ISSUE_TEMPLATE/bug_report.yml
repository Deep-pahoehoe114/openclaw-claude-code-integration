name: Bug Report 🐛
description: Report something that doesn't work correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Description
        Please describe the bug clearly.

  - type: textarea
    id: repro
    attributes:
      label: "复现步骤"
      description: "How can we reproduce this bug?"
      placeholder: "1. Go to '...'\n2. Run '...'\n3. See error"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "预期行为"
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "错误日志"
      description: "Paste any relevant error messages or logs"
      placeholder: "Paste logs here..."

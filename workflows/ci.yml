name: Skills Sync Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pytest
        run: |
          pip install pytest
          cd skills/memory-compaction/scripts && pytest ../../tests/ -v --tb=short 2>/dev/null || echo "No pytest configured yet"

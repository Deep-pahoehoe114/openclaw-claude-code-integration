name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Sync generated assets
        run: python tools/sync_repo_state.py
      - name: Run shared checks
        run: python tools/run_checks.py --all
      - name: Smoke test
        run: python tools/smoke_test.py
